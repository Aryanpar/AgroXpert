org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:ReservedCodeCacheSize=512m -XX:+UseParallelGC -Dfile.encoding=UTF-8
# Keeping the daemon enabled improves performance and reduces OOM risk on repeated builds.
org.gradle.daemon=true
org.gradle.parallel=true
# Let Gradle decide worker count unless you have very low RAM/CPU.
# org.gradle.workers.max=1
kotlin.incremental=false
android.useAndroidX=true
android.enableJetifier=true
# Fix for flutter_bluetooth_serial resource linking
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false
